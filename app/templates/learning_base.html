{% extends 'base.html' %}

{% block content %}
<div class="learning-shell">

    <!-- ─── Course Syllabus Sidebar ───────────────────── -->
    <aside class="learning-sidebar">
        <p class="sidebar-section-label mb-3">Course Syllabus</p>

        <div class="flex flex-col gap-4">
            {% for module in sub_course.modules %}
            <div>
                <div class="module-title">{{ module.title }}</div>
                <div class="flex flex-col gap-0.5">
                    {% for item in module.lessons if item.is_published %}
                    <a href="{{ url_for('learning.lesson_detail', lesson_id=item.id) }}"
                       class="lesson-link {% if current_lesson and current_lesson.id == item.id %}active{% endif %}">
                        <svg class="w-3.5 h-3.5 flex-shrink-0 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            {% if current_lesson and current_lesson.id == item.id %}
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            {% else %}
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            {% endif %}
                        </svg>
                        <span>{{ item.title }}</span>
                    </a>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        </div>
    </aside>

    <!-- ─── Lesson content area ───────────────────────── -->
    <section class="learning-content min-w-0">
        {% block learning_content %}{% endblock %}
    </section>

</div>
{% endblock %}
